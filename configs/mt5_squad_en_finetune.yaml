seed: 42
output_dir: outputs/mt5_squad_en_finetune
run_validation_generation: true

model:
  name: google/mt5-base
  use_fast: false
  use_safetensors: false
  tie_word_embeddings: false

data:
  source_template: "generate question: context: {context} answer: {answer}"
  max_source_length: 384
  max_target_length: 64

  train_datasets:
    - type: hf
      path: rajpurkar/squad
      split: train
      language: en
      dataset_name: squad_train

  validation_datasets:
    - type: hf
      path: rajpurkar/squad
      split: validation
      language: en
      dataset_name: squad_validation

  evaluation_datasets:
    - type: hf
      path: rajpurkar/squad
      split: validation
      language: en
      dataset_name: squad_validation

training:
  batch_size: 4
  learning_rate: 3.0e-5
  num_epochs: 3
  gradient_accumulation_steps: 4
  warmup_ratio: 0.06
  early_stopping_patience: 1

generation:
  max_new_tokens: 64
  num_beams: 4
  do_sample: false
  temperature: 1.0
  top_p: 1.0

evaluation:
  language: en
  bertscore_model_type: bert-base-uncased
