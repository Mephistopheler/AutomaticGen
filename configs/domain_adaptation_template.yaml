seed: 42
output_dir: outputs/domain_adaptation_template
run_validation_generation: true

model:
  name: ai-forever/ruT5-base
  use_fast: false
  use_safetensors: true

data:
  source_template: "generate question: context: {context} answer: {answer}"
  max_source_length: 384
  max_target_length: 64

  train_datasets:
    - type: json
      data_files: data/examples/domain_train.jsonl
      split: train
      language: ru
      dataset_name: local_domain_train

  validation_datasets:
    - type: json
      data_files: data/examples/domain_train.jsonl
      split: train
      language: ru
      dataset_name: local_domain_validation

  evaluation_datasets:
    - type: json
      data_files: data/examples/domain_train.jsonl
      split: train
      language: ru
      dataset_name: local_domain_eval

training:
  batch_size: 2
  learning_rate: 3.0e-5
  num_epochs: 10
  gradient_accumulation_steps: 1
  warmup_ratio: 0.1
  early_stopping_patience: 3

generation:
  max_new_tokens: 64
  num_beams: 4
  do_sample: false
  temperature: 1.0
  top_p: 1.0

evaluation:
  language: ru
  bertscore_model_type: bert-base-multilingual-cased
